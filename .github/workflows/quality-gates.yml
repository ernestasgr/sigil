name: Quality Gates

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: quality-gates-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    quality-gates:
        name: Quality gates (Windows)
        runs-on: windows-latest
        timeout-minutes: 60
        permissions:
            contents: read
        env:
            CI: 'true'
        steps:
            - name: Bootstrap - checkout source
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  fetch-depth: 1
                  persist-credentials: false

            - name: Bootstrap - setup pnpm 11.8.0
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
              with:
                  version: 11.8.0

            - name: Bootstrap - setup Node.js 22.13.0
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 22.13.0
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Bootstrap - verify Windows prerequisites
              shell: pwsh
              run: pwsh .github/scripts/verify-windows-bootstrap.ps1

            - name: Bootstrap - install workspace dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Bootstrap - build shared schema package
              run: pnpm --filter @sigil/schema build

            - name: Advisory gate - Knip machine-readable report
              shell: pwsh
              run: |
                  $reportPath = Join-Path $env:GITHUB_WORKSPACE 'knip-report.json'
                  $report = (pnpm --silent knip:report | Out-String).Trim()
                  [System.IO.File]::WriteAllText($reportPath, $report, [System.Text.UTF8Encoding]::new($false))

            - name: Fast gate - lint
              run: pnpm lint

            - name: Fast gate - formatting
              run: pnpm format:check

            - name: Fast gate - architecture
              run: pnpm architecture:check

            - name: Fast gate - typecheck
              run: pnpm typecheck

            - name: Fast gate - pure schema and renderer tests
              run: pnpm test:fast

            - name: Fast gate - renderer DOM interaction tests
              run: pnpm --filter @sigil/desktop test:renderer:dom

            - name: Bootstrap - prepare native SQLite runtime
              run: pnpm setup:native

            - name: Bootstrap - verify native SQLite runtime
              run: pnpm check:native

            - name: Native gate - all Vitest projects with coverage
              run: pnpm test:coverage

            - name: Native gate - enforce coverage baseline
              run: pnpm coverage:check

            - name: Build gate - schema and Electron production build
              run: pnpm build

            - name: E2E gate - Electron Workflow lifecycle smoke test
              run: pnpm --filter @sigil/desktop test:e2e

            - name: Release gate - verify production artifacts and startup
              run: pnpm verify:production

            - name: Upload Electron smoke diagnostics
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: sigil-electron-smoke-${{ github.run_id }}
                  path: |
                      apps/desktop/test-results
                      apps/desktop/playwright-report
                  if-no-files-found: warn
                  retention-days: 14

            - name: Preserve quality-gate diagnostics
              if: always()
              shell: pwsh
              run: |
                  $diagnostics = Join-Path $env:RUNNER_TEMP 'sigil-quality-gates-diagnostics.txt'
                  $pythonVersion = if ($null -ne (Get-Command python -ErrorAction SilentlyContinue)) { (python --version 2>&1 | Out-String).Trim() } else { 'unavailable' }
                  $nodeVersion = if ($null -ne (Get-Command node -ErrorAction SilentlyContinue)) { (node --version 2>&1 | Out-String).Trim() } else { 'unavailable' }
                  $pnpmVersion = if ($null -ne (Get-Command pnpm -ErrorAction SilentlyContinue)) { (pnpm --version 2>&1 | Out-String).Trim() } else { 'unavailable' }
                  $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
                  $visualStudio = if (Test-Path -LiteralPath $vswhere) { (& $vswhere -latest -products '*' -property installationPath | Select-Object -First 1 | Out-String).Trim() } else { 'unavailable' }

                  @(
                      "Runner: $env:RUNNER_OS"
                      "Node: $nodeVersion"
                      "pnpm: $pnpmVersion"
                      "Python: $pythonVersion"
                      "Visual Studio: $visualStudio"
                      "Commit: $env:GITHUB_SHA"
                  ) | Set-Content -Path $diagnostics -Encoding utf8

            - name: Summarize quality gates
              if: always()
              shell: pwsh
              env:
                  JOB_STATUS: ${{ job.status }}
              run: |
                  @(
                      '## Quality gates',
                      '',
                      "- **Status:** $env:JOB_STATUS",
                      "- **Runner:** $env:RUNNER_OS",
                      '- **Commands:** `pnpm lint`, `pnpm format:check`, `pnpm architecture:check`, `pnpm typecheck`, `pnpm test:fast`, `pnpm --filter @sigil/desktop test:renderer:dom`, native setup/check, `pnpm test:coverage` (schema, desktop, and renderer projects), `pnpm coverage:check`, `pnpm build`, `pnpm --filter @sigil/desktop test:e2e`, and `pnpm verify:production`',
                      '- **Bootstrap ownership:** Node.js, pnpm, Python, Visual Studio C++ prerequisites, dependency installation, schema build, and native SQLite setup.',
                      '- **Product ownership:** static checks, pure tests, native tests, coverage baseline, production build, artifact completeness, and Electron startup.',
                      '- **Native isolation:** dependency lifecycle scripts are disabled during install; native setup runs explicitly after the fast checks.'
                  ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY

            - name: Upload quality-gate diagnostics
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: sigil-quality-gates-diagnostics-${{ github.run_id }}
                  path: ${{ runner.temp }}/sigil-quality-gates-diagnostics.txt
                  if-no-files-found: warn
                  retention-days: 7

            - name: Upload coverage reports
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: sigil-coverage-${{ github.run_id }}
                  path: |
                      packages/schema/coverage
                      apps/desktop/coverage
                  if-no-files-found: warn
                  retention-days: 14

            - name: Upload Knip advisory report
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: sigil-knip-${{ github.run_id }}
                  path: knip-report.json
                  if-no-files-found: warn
                  retention-days: 14
